<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Achievement: Social Butterfly (added 5 friends) -->
  <!-- Badge border -->
  <rect x="2" y="2" width="44" height="44" fill="none" stroke="#A855F7" stroke-width="3"/>
  <rect x="2" y="2" width="6" height="6" fill="#00D2FF"/>
  <rect x="40" y="2" width="6" height="6" fill="#00D2FF"/>
  <rect x="2" y="40" width="6" height="6" fill="#00D2FF"/>
  <rect x="40" y="40" width="6" height="6" fill="#00D2FF"/>
  <!-- Center person -->
  <rect x="20" y="10" width="8" height="6" fill="#00D2FF"/>
  <rect x="20" y="18" width="8" height="4" fill="#A855F7"/>
  <!-- Left person (smaller) -->
  <rect x="8" y="14" width="6" height="4" fill="#00D2FF"/>
  <rect x="8" y="20" width="6" height="4" fill="#A855F7"/>
  <!-- Right person (smaller) -->
  <rect x="34" y="14" width="6" height="4" fill="#00D2FF"/>
  <rect x="34" y="20" width="6" height="4" fill="#A855F7"/>
  <!-- Connection lines -->
  <rect x="14" y="18" width="6" height="2" fill="#A855F7" opacity="0.6"/>
  <rect x="28" y="18" width="6" height="2" fill="#A855F7" opacity="0.6"/>
  <!-- Stars around -->
  <rect x="10" y="8" width="2" height="2" fill="#FFD460"/>
  <rect x="36" y="8" width="2" height="2" fill="#FFD460"/>
  <rect x="22" y="28" width="4" height="2" fill="#FFD460"/>
  <!-- "5" -->
  <rect x="18" y="32" width="12" height="2" fill="#00D2FF"/>
  <rect x="18" y="34" width="4" height="2" fill="#00D2FF"/>
  <rect x="18" y="36" width="12" height="2" fill="#00D2FF"/>
  <rect x="26" y="38" width="4" height="2" fill="#00D2FF"/>
  <rect x="18" y="40" width="12" height="2" fill="#00D2FF"/>
</svg>
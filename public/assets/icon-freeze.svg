<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!-- Pixel snowflake/freeze - streak freeze -->
  <!-- Vertical bar -->
  <rect x="11" y="2" width="2" height="20" fill="#00D2FF"/>
  <!-- Horizontal bar -->
  <rect x="2" y="11" width="20" height="2" fill="#00D2FF"/>
  <!-- Diagonal arms (top-left to bottom-right) -->
  <rect x="6" y="6" width="2" height="2" fill="#EAEAEA"/>
  <rect x="16" y="16" width="2" height="2" fill="#EAEAEA"/>
  <!-- Diagonal arms (top-right to bottom-left) -->
  <rect x="16" y="6" width="2" height="2" fill="#EAEAEA"/>
  <rect x="6" y="16" width="2" height="2" fill="#EAEAEA"/>
  <!-- Branch tips -->
  <rect x="4" y="4" width="2" height="2" fill="#00D2FF"/>
  <rect x="18" y="4" width="2" height="2" fill="#00D2FF"/>
  <rect x="4" y="18" width="2" height="2" fill="#00D2FF"/>
  <rect x="18" y="18" width="2" height="2" fill="#00D2FF"/>
</svg>
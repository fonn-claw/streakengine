<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Achievement: Century Club (earn 10,000 total XP) -->
  <!-- Badge border -->
  <rect x="2" y="2" width="44" height="44" fill="none" stroke="#FFD460" stroke-width="3"/>
  <rect x="2" y="2" width="6" height="6" fill="#00D2FF"/>
  <rect x="40" y="2" width="6" height="6" fill="#00D2FF"/>
  <rect x="2" y="40" width="6" height="6" fill="#00D2FF"/>
  <rect x="40" y="40" width="6" height="6" fill="#00D2FF"/>
  <!-- Star burst (pixel) -->
  <rect x="22" y="6" width="4" height="2" fill="#FFD460"/>
  <rect x="20" y="8" width="8" height="2" fill="#FFD460"/>
  <rect x="10" y="12" width="28" height="2" fill="#FFD460"/>
  <rect x="18" y="10" width="12" height="2" fill="#FFD460"/>
  <rect x="14" y="14" width="20" height="2" fill="#FFD460"/>
  <rect x="18" y="16" width="12" height="2" fill="#FFD460"/>
  <rect x="20" y="18" width="8" height="2" fill="#FFD460"/>
  <rect x="22" y="20" width="4" height="2" fill="#FFD460"/>
  <!-- "10K" text (pixel) -->
  <!-- "1" -->
  <rect x="12" y="26" width="2" height="2" fill="#FF6B35"/>
  <rect x="14" y="24" width="2" height="10" fill="#FF6B35"/>
  <rect x="12" y="32" width="6" height="2" fill="#FF6B35"/>
  <!-- "0" -->
  <rect x="20" y="24" width="6" height="2" fill="#FF6B35"/>
  <rect x="20" y="26" width="2" height="6" fill="#FF6B35"/>
  <rect x="24" y="26" width="2" height="6" fill="#FF6B35"/>
  <rect x="20" y="32" width="6" height="2" fill="#FF6B35"/>
  <!-- "K" -->
  <rect x="28" y="24" width="2" height="10" fill="#FF6B35"/>
  <rect x="32" y="24" width="2" height="2" fill="#FF6B35"/>
  <rect x="30" y="26" width="2" height="2" fill="#FF6B35"/>
  <rect x="30" y="28" width="2" height="2" fill="#FF6B35"/>
  <rect x="32" y="30" width="2" height="2" fill="#FF6B35"/>
  <rect x="34" y="32" width="2" height="2" fill="#FF6B35"/>
  <!-- XP sparkles -->
  <rect x="8" y="38" width="2" height="2" fill="#00D2FF"/>
  <rect x="38" y="38" width="2" height="2" fill="#00D2FF"/>
  <rect x="8" y="8" width="2" height="2" fill="#00D2FF"/>
  <rect x="38" y="8" width="2" height="2" fill="#00D2FF"/>

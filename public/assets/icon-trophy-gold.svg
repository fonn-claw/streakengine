<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!-- Pixel trophy - gold (1st place) -->
  <!-- Cup rim -->
  <rect x="4" y="2" width="16" height="2" fill="#FFD460"/>
  <!-- Cup body -->
  <rect x="2" y="4" width="20" height="2" fill="#FFD460"/>
  <rect x="2" y="6" width="20" height="2" fill="#FFD460"/>
  <rect x="4" y="8" width="16" height="2" fill="#FFD460"/>
  <rect x="6" y="10" width="12" height="2" fill="#FFD460"/>
  <rect x="8" y="12" width="8" height="2" fill="#FFD460"/>
  <!-- Stem -->
  <rect x="10" y="14" width="4" height="2" fill="#E94560"/>
  <rect x="10" y="16" width="4" height="2" fill="#E94560"/>
  <!-- Base -->
  <rect x="6" y="18" width="12" height="2" fill="#FFD460"/>
  <rect x="6" y="20" width="12" height="2" fill="#FFD460"/>
  <!-- Star on cup -->
  <rect x="10" y="6" width="4" height="2" fill="#E94560"/>
  <rect x="12" y="4" width="2" height="2" fill="#E94560"/>
</svg>
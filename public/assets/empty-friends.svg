<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160">
  <!-- Empty state: no friends yet -->
  <!-- Ghost person (outlined, not filled) -->
  <rect x="80" y="24" width="40" height="32" fill="none" stroke="#8B8B9E" stroke-width="3" stroke-dasharray="4 4"/>
  <rect x="76" y="60" width="48" height="8" fill="none" stroke="#8B8B9E" stroke-width="3" stroke-dasharray="4 4"/>
  <rect x="72" y="68" width="56" height="24" fill="none" stroke="#8B8B9E" stroke-width="3" stroke-dasharray="4 4"/>
  <!-- Plus sign (add friend) -->
  <rect x="134" y="44" width="16" height="4" fill="#00D2FF"/>
  <rect x="140" y="38" width="4" height="16" fill="#00D2FF"/>
  <!-- Question marks -->
  <rect x="50" y="40" width="8" height="4" fill="#533483"/>
  <rect x="58" y="36" width="4" height="4" fill="#533483"/>
  <rect x="54" y="44" width="4" height="4" fill="#533483"/>
  <rect x="54" y="52" width="4" height="4" fill="#533483"/>
  <!-- Second ghost person (smaller, behind) -->
  <rect x="44" y="72" width="24" height="20" fill="none" stroke="#8B8B9E" stroke-width="2" stroke-dasharray="4 4"/>
  <rect x="40" y="96" width="32" height="16" fill="none" stroke="#8B8B9E" stroke-width="2" stroke-dasharray="4 4"/>
</svg>
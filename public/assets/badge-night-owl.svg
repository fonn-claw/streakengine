<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Achievement: Night Owl (log habit after 10 PM) -->
  <!-- Badge border -->
  <rect x="2" y="2" width="44" height="44" fill="none" stroke="#7C3AED" stroke-width="3"/>
  <rect x="2" y="2" width="6" height="6" fill="#00D2FF"/>
  <rect x="40" y="2" width="6" height="6" fill="#00D2FF"/>
  <rect x="2" y="40" width="6" height="6" fill="#00D2FF"/>
  <rect x="40" y="40" width="6" height="6" fill="#00D2FF"/>
  <!-- Moon (pixel crescent) -->
  <rect x="28" y="6" width="8" height="2" fill="#FFD460"/>
  <rect x="26" y="8" width="4" height="2" fill="#FFD460"/>
  <rect x="34" y="8" width="4" height="2" fill="#FFD460"/>
  <rect x="24" y="10" width="4" height="2" fill="#FFD460"/>
  <rect x="24" y="12" width="4" height="2" fill="#FFD460"/>
  <rect x="26" y="14" width="4" height="2" fill="#FFD460"/>
  <rect x="28" y="16" width="8" height="2" fill="#FFD460"/>
  <!-- Stars -->
  <rect x="10" y="8" width="2" height="2" fill="#FFD460"/>
  <rect x="16" y="14" width="2" height="2" fill="#FFD460"/>
  <rect x="8" y="18" width="2" height="2" fill="#FFD460"/>
  <!-- Owl eyes -->
  <rect x="14" y="22" width="4" height="4" fill="#FFD460"/>
  <rect x="16" y="24" width="2" height="2" fill="#1A1A2E"/>
  <rect x="22" y="22" width="4" height="4" fill="#FFD460"/>
  <rect x="24" y="24" width="2" height="2" fill="#1A1A2E"/>
  <!-- Owl beak -->
  <rect x="20" y="26" width="2" height="2" fill="#FF6B35"/>
  <!-- Owl body -->
  <rect x="12" y="28" width="18" height="2" fill="#7C3AED"/>
  <rect x="14" y="30" width="14" height="2" fill="#7C3AED"/>
  <rect x="14" y="32" width="14" height="2" fill="#7C3AED"/>
  <!-- Owl feet -->
  <rect x="16" y="34" width="4" height="2" fill="#FFD460"/>
  <rect x="24" y="34" width="4" height="2" fill="#FFD460"/>
  <!-- "10PM" label -->
  <rect x="12" y="38" width="2" height="4" fill="#00D2FF"/>
  <rect x="16" y="38" width="2" height="2" fill="#00D2FF"/>
  <rect x="16" y="40" width="2" height="2" fill="#00D2FF"/>
  <rect x="18" y="38" width="2" height="4" fill="#00D2FF"/>
</svg>
